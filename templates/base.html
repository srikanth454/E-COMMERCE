<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopEasy{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="{{ url_for('home') }}" class="logo">ShopEasy</a>
            <nav>
                <a href="{{ url_for('home') }}" class="nav-link">Shop</a>
                <a href="{{ url_for('orders_page') }}" class="nav-link">
                    Orders
                    <span class="badge">{{ order_count }}</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Simple Python E-Commerce &mdash; Flask</p>
        </div>
    </footer>
</body>
</html>
